<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบบันทึกไข่ฟัก (UX PRO)</title>

<style>
body{font-family:sans-serif;background:#eef2f7;padding:20px}
.card{max-width:600px;margin:auto;background:#fff;padding:20px;border-radius:12px}

.num-box{
  display:grid;
  grid-template-columns:50px 1fr 50px;
  gap:5px;
}
.step-btn{
  font-size:22px;
  background:#e2e8f0;
  border:none;
  border-radius:8px;
}

input,select{
  width:100%;
  padding:10px;
  margin:5px 0;
}

.total{
  font-size:26px;
  font-weight:bold;
}

button.save{
  width:100%;
  padding:12px;
  background:#16a34a;
  color:white;
  border:none;
  border-radius:8px;
}
</style>

</head>
<body>

<div class="card">
<h2>บันทึกไข่ฟัก (UX PRO)</h2>

<input type="date" id="date">

<select id="house">
<option value="">เลือกโรงเรือน</option>
</select>

<div id="inputs"></div>

<div class="total">รวม: <span id="total">0</span></div>

<button class="save" onclick="save()">บันทึก</button>

<div id="msg"></div>
</div>

<script>

const url = "https://script.google.com/macros/s/AKfycbzSCz6q8JxjJVHA_wgnwZjGQFWoXxyqkO4Kr43OdBp9ywfMBu5oGrOrP6jObbuoV32L/exec";

const labels = [
"น้อยกว่า 64",
"65-72",
"73-76",
"77+",
"ไข่แฝด",
"ไข่บุบร้าว",
"ไข่เสีย"
];

for(let i=1;i<=12;i++){
document.getElementById("house").innerHTML += `<option>${i}</option>`;
}

labels.forEach((l,i)=>{
document.getElementById("inputs").innerHTML += `
<div>
<label>${l}</label>
<div class="num-box">
<button class="step-btn" onclick="step(${i},-1)">-</button>
<input id="e${i}" type="number" placeholder="0">
<button class="step-btn" onclick="step(${i},1)">+</button>
</div>
</div>`;
});

function get(id){
return Number(document.getElementById(id).value||0)
}

function update(){
let sum=0;
for(let i=0;i<7;i++){
sum+=get("e"+i)
}
document.getElementById("total").innerText=sum
}

function step(i,dir){
let el=document.getElementById("e"+i);
let v=get("e"+i)+dir;
if(v<0)v=0;
el.value = v===0 ? "" : v;
update();
}

function save(){
let data={
date:date.value,
house:house.value,
e1:get("e0"),
e2:get("e1"),
e3:get("e2"),
e4:get("e3"),
e5:get("e4"),
e6:get("e5"),
e7:get("e6"),
total:total.innerText
}

fetch(url,{
method:"POST",
mode:"no-cors",
body:JSON.stringify(data)
})

msg.innerText="บันทึกแล้ว"
}

</script>

</body>
</html>
