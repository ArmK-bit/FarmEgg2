<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบไข่ฟัก</title>

<style>
body{font-family:sans-serif;background:#eef2f7;padding:20px}
.card{max-width:600px;margin:auto;background:#fff;padding:20px;border-radius:12px}
input,select{width:100%;padding:10px;margin:5px 0}
button{padding:12px;width:100%;background:#16a34a;color:#fff;border:none;border-radius:8px}
.total{font-size:28px;font-weight:bold}
</style>
</head>

<body>
<div class="card">
<h2>บันทึกไข่ฟัก</h2>

<input type="date" id="date">

<select id="house">
<option value="">เลือกโรงเรือน</option>
<script>
for(let i=1;i<=12;i++){
document.write(`<option value="${i}">โรงเรือน ${i}</option>`)
}
</script>
</select>

<h3>น้ำหนักไข่</h3>
<input id="e1" type="number" value="0" placeholder="น้อยกว่า 64">
<input id="e2" type="number" value="0" placeholder="65-72">
<input id="e3" type="number" value="0" placeholder="73-76">
<input id="e4" type="number" value="0" placeholder="77+">
<input id="e5" type="number" value="0" placeholder="ไข่แฝด">
<input id="e6" type="number" value="0" placeholder="ไข่บุบร้าว">
<input id="e7" type="number" value="0" placeholder="ไข่เสียหาย">

<div class="total">รวม: <span id="total">0</span></div>

<button onclick="save()">บันทึก</button>

<div id="msg"></div>

</div>

<script>
const url = "https://script.google.com/macros/s/AKfycbzbl8Dg8KW8_1OYoN3O6bK47-B_hvkpvZDHBZ7vOEC6O6WG19c7BW4GxmDwx4YgfK-G/exec";

function get(id){
return Number(document.getElementById(id).value||0)
}

function update(){
let sum = ["e1","e2","e3","e4","e5","e6","e7"]
.reduce((a,b)=>a+get(b),0)
document.getElementById("total").innerText = sum
}

["e1","e2","e3","e4","e5","e6","e7"].forEach(id=>{
document.getElementById(id).oninput = update
})

update()

function save(){
let data = {
date: document.getElementById("date").value,
house: document.getElementById("house").value,
e1:get("e1"),e2:get("e2"),e3:get("e3"),
e4:get("e4"),e5:get("e5"),e6:get("e6"),e7:get("e7"),
total: document.getElementById("total").innerText
}

fetch(url,{
method:"POST",
mode:"no-cors",
body:JSON.stringify(data)
})

document.getElementById("msg").innerText="ส่งข้อมูลแล้ว (เช็คใน Google Sheet)"
}
</script>

</body>
</html>
