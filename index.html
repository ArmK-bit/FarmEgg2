<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบบันทึกไข่ฟัก</title>
<style>
body{font-family:sans-serif;background:#eef2f7;padding:20px}
.card{max-width:600px;margin:auto;background:#fff;padding:20px;border-radius:12px}
input,select{width:100%;padding:10px;margin:5px 0}
.total{font-size:24px;font-weight:bold}
button{width:100%;padding:12px;background:#16a34a;color:#fff;border:none;border-radius:8px}
</style>
</head>
<body>

<div class="card">
<h2>บันทึกไข่ฟัก</h2>

<input type="date" id="date">

<select id="house">
<option value="">เลือกโรงเรือน</option>
</select>

<input id="e1" type="number" placeholder="0">
<input id="e2" type="number" placeholder="0">
<input id="e3" type="number" placeholder="0">
<input id="e4" type="number" placeholder="0">
<input id="e5" type="number" placeholder="0">
<input id="e6" type="number" placeholder="0">
<input id="e7" type="number" placeholder="0">

<div class="total">รวม: <span id="total">0</span></div>

<button onclick="save()">บันทึก</button>

<div id="msg"></div>
</div>

<script>

const url = "https://script.google.com/macros/s/AKfycbzSCz6q8JxjJVHA_wgnwZjGQFWoXxyqkO4Kr43OdBp9ywfMBu5oGrOrP6jObbuoV32L/exec";

for(let i=1;i<=12;i++){
document.getElementById("house").innerHTML += `<option>${i}</option>`;
}

function get(id){
return Number(document.getElementById(id).value||0)
}

function update(){
let sum=0;
["e1","e2","e3","e4","e5","e6","e7"].forEach(id=>{
sum+=get(id)
})
document.getElementById("total").innerText=sum
}

["e1","e2","e3","e4","e5","e6","e7"].forEach(id=>{
let el=document.getElementById(id)

el.addEventListener("input",update)

el.addEventListener("focus",()=>{
if(el.value==="0") el.value=""
})

el.addEventListener("blur",()=>{
if(el.value==="") return
let v=parseInt(el.value)
el.value = (v>0)?v:""
})
})

function save(){
let data={
date:date.value,
house:house.value,
e1:get("e1"),
e2:get("e2"),
e3:get("e3"),
e4:get("e4"),
e5:get("e5"),
e6:get("e6"),
e7:get("e7"),
total:total.innerText
}

fetch(url,{
method:"POST",
mode:"no-cors",
body:JSON.stringify(data)
})

msg.innerText="บันทึกแล้ว"

["e1","e2","e3","e4","e5","e6","e7"].forEach(id=>{
document.getElementById(id).value=""
})

update()
}

</script>

</body>
</html>
